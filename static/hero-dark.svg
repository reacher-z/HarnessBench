<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 440" preserveAspectRatio="xMidYMid meet" role="img" aria-label="HarnessBench — Comparing Agentic Harnesses on Everyday Online Tasks">
  <defs>
