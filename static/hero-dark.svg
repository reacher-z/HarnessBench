  <text x="100" y="415" font-family="'Inter','SF Pro Text',sans-serif" font-size="14" fill="#94a3b8">pip install harness-bench &#160;&#8226;&#160; same 5-layer recording as ClawBench &#160;&#8226;&#160; cloud harnesses opt-in</text>
