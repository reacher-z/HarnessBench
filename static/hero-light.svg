<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 440" preserveAspectRatio="xMidYMid meet" role="img" aria-label="HarnessBench — Comparing Agentic Harnesses on Everyday Online Tasks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf6ec"/>
      <stop offset="0.45" stop-color="#fef3e0"/>
      <stop offset="0.85" stop-color="#fce4d1"/>
      <stop offset="1" stop-color="#f5d8c3"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.15" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#fff4d6" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#fef3e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="0.95" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#e8f0fb" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fce4d1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="0.5" stop-color="#d97706"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#21bca8"/>
      <stop offset="0.33" stop-color="#d97706"/>
      <stop offset="0.66" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#ffc45e"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 L0 0 0 44" fill="none" stroke="#1f3d63" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1640" height="440" fill="url(#bg)"/>
  <rect width="1640" height="440" fill="url(#warm)"/>
  <rect width="1640" height="440" fill="url(#cool)"/>
  <rect width="1640" height="440" fill="url(#grid)"/>

  <!-- Rainbow accent line (neuralcomputer signature) -->
  <rect x="100" y="118" width="180" height="3" rx="1.5" fill="url(#accent)" opacity="0.85"/>

  <!-- Eyebrow -->
  <text x="100" y="102" font-family="'Inter','SF Pro Text','Avenir Next',-apple-system,Segoe UI,sans-serif" font-size="18" font-weight="600" letter-spacing="2.8" fill="#5b6474">AGENT&#160;HARNESS&#160;COMPARISON&#160;&#8226;&#160;153&#160;TASKS&#160;&#8226;&#160;6&#160;HARNESSES</text>

  <!-- Wordmark -->
  <text x="100" y="232" font-family="'Iowan Old Style',Palatino,Georgia,'Times New Roman',serif" font-size="128" font-weight="700" fill="#1f3d63" letter-spacing="-2">Harness<tspan fill="url(#amber)">Bench</tspan></text>

  <!-- Tagline -->
  <text x="100" y="300" font-family="'Iowan Old Style',Palatino,Georgia,'Times New Roman',serif" font-size="30" font-style="italic" fill="#5b6474">The benchmark for comparing agentic harnesses on</text>
  <text x="100" y="338" font-family="'Iowan Old Style',Palatino,Georgia,'Times New Roman',serif" font-size="30" font-style="italic" fill="#5b6474">everyday online tasks &#8212; same pipeline, orthogonal axis.</text>

  <!-- Right-side decorative: six harness chips forming a harness chain -->
  <g transform="translate(1160 110)" font-family="'Inter','SF Pro Text','Avenir Next',sans-serif" font-size="16" font-weight="600">
    <!-- connector curves -->
    <path d="M90 40 Q 180 20, 270 40" fill="none" stroke="#1f3d63" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="3 4"/>
    <path d="M90 130 Q 180 150, 270 130" fill="none" stroke="#1f3d63" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="3 4"/>
    <path d="M90 220 Q 180 200, 270 220" fill="none" stroke="#1f3d63" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="3 4"/>

    <!-- chip: openclaw -->
    <g>
      <rect x="0" y="18" width="180" height="44" rx="22" fill="#fff7eb" stroke="#d97706" stroke-width="1.5"/>
      <circle cx="22" cy="40" r="5" fill="#d97706"/>
      <text x="40" y="46" fill="#1f3d63">openclaw</text>
    </g>
    <!-- chip: hermes -->
    <g>
      <rect x="200" y="18" width="180" height="44" rx="22" fill="#fff7eb" stroke="#d97706" stroke-width="1.5"/>
      <circle cx="222" cy="40" r="5" fill="#d97706"/>
      <text x="240" y="46" fill="#1f3d63">hermes</text>
    </g>
    <!-- chip: claw-code (rust) -->
    <g>
      <rect x="0" y="108" width="180" height="44" rx="22" fill="#fff7eb" stroke="#b45309" stroke-width="1.5"/>
      <circle cx="22" cy="130" r="5" fill="#b45309"/>
      <text x="40" y="136" fill="#1f3d63">claw-code</text>
    </g>
    <!-- chip: browser-use -->
    <g>
      <rect x="200" y="108" width="180" height="44" rx="22" fill="#fff7eb" stroke="#d97706" stroke-width="1.5"/>
      <circle cx="222" cy="130" r="5" fill="#d97706"/>
      <text x="240" y="136" fill="#1f3d63">browser-use</text>
    </g>
    <!-- chip: stagehand (cloud) -->
    <g>
      <rect x="0" y="198" width="180" height="44" rx="22" fill="#eef6fb" stroke="#0369a1" stroke-width="1.5"/>
      <circle cx="22" cy="220" r="5" fill="#0369a1"/>
      <text x="40" y="226" fill="#1f3d63">stagehand</text>
      <text x="150" y="226" font-size="11" font-weight="700" fill="#0369a1">&#9729;</text>
    </g>
    <!-- chip: coze-studio (cloud) -->
    <g>
      <rect x="200" y="198" width="180" height="44" rx="22" fill="#eef6fb" stroke="#0369a1" stroke-width="1.5"/>
      <circle cx="222" cy="220" r="5" fill="#0369a1"/>
      <text x="240" y="226" fill="#1f3d63">coze-studio</text>
      <text x="350" y="226" font-size="11" font-weight="700" fill="#0369a1">&#9729;</text>
    </g>
  </g>

  <!-- Bottom-left footer line -->
  <rect x="100" y="390" width="1440" height="1" fill="#1f3d63" fill-opacity="0.12"/>
  <text x="100" y="415" font-family="'Inter','SF Pro Text',sans-serif" font-size="14" fill="#5b6474">pip install harness-bench &#160;&#8226;&#160; same 5-layer recording as ClawBench &#160;&#8226;&#160; cloud harnesses opt-in</text>
</svg>
